name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Verify release versions
        run: node scripts/verify-release-version.mjs ${{ github.ref_name }}
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Archiplayer ${{ github.ref_name }}
          releaseBody: |
            Cross-platform Archiplayer release.

            These community builds are currently unsigned. Read the installation notes on the project site before opening them.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checksums:
    needs: publish
    runs-on: ubuntu-22.04
    steps:
      - name: Add checksums to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Draft releases have no git tag ref yet, so /releases/tags/{tag} (what
          # `gh release download|upload <tag>` uses) 404s. Resolve by id instead.
          release_id=$(gh api "repos/$REPO/releases" --paginate \
            --jq "map(select(.tag_name == \"$TAG\")) | .[0].id // empty")
          if [ -z "$release_id" ]; then
            echo "No release found for tag $TAG" >&2
            exit 1
          fi

          mkdir release-assets
          gh api "repos/$REPO/releases/$release_id/assets" --paginate \
            --jq '.[] | select(.name != "SHA256SUMS.txt") | "\(.id)\t\(.name)"' > assets.tsv

          while IFS=$'\t' read -r id name; do
            gh api "repos/$REPO/releases/assets/$id" \
              -H "Accept: application/octet-stream" > "release-assets/$name"
          done < assets.tsv

          (cd release-assets && sha256sum -- *) > SHA256SUMS.txt
          cat SHA256SUMS.txt

          # Replace any previous copy, then upload via the assets API.
          old=$(gh api "repos/$REPO/releases/$release_id/assets" --paginate \
            --jq '.[] | select(.name == "SHA256SUMS.txt") | .id')
          for id in $old; do
            gh api --method DELETE "repos/$REPO/releases/assets/$id"
          done
          gh api --method POST \
            "https://uploads.github.com/repos/$REPO/releases/$release_id/assets?name=SHA256SUMS.txt" \
            -H "Content-Type: text/plain" \
            --input SHA256SUMS.txt
